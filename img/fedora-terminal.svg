<svg xmlns="http://www.w3.org/2000/svg" width="350" height="330" viewBox="0 0 350 330" role="img" aria-labelledby="title desc">
  <title id="title">Fedora Linux ASCII logo</title>
  <desc id="desc">A blue Fedora Linux logo drawn in terminal ASCII characters.</desc>
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="fedoraBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8bd5ff"/>
      <stop offset="0.5" stop-color="#51a2da"/>
      <stop offset="1" stop-color="#294172"/>
    </linearGradient>
  </defs>
  <rect x="0.5" y="0.5" width="349" height="329" rx="10" fill="#0d1117" fill-opacity="0.35" stroke="#51a2da" stroke-opacity="0.22"/>
  <text x="18" y="28" fill="url(#fedoraBlue)" filter="url(#glow)" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" font-weight="600" xml:space="preserve">
    <tspan x="18" dy="0">          /:-------------:\</tspan>
    <tspan x="18" dy="17">       :-------------------::</tspan>
    <tspan x="18" dy="17">     :-----------/shhOHbmp---:\</tspan>
    <tspan x="18" dy="17">   /-----------omMMMNNNMMD  ---:</tspan>
    <tspan x="18" dy="17">  :-----------sMMMMNMNMP.    ---:</tspan>
    <tspan x="18" dy="17"> :-----------:MMMdP-------    ---\</tspan>
    <tspan x="18" dy="17">,------------:MMMd--------    ---:</tspan>
    <tspan x="18" dy="17">:------------:MMMd-------    .---:</tspan>
    <tspan x="18" dy="17">:----    oNMMMMMMMMMNho     .----:</tspan>
    <tspan x="18" dy="17">:--     .+shhhMMMmhhy++   .------/</tspan>
    <tspan x="18" dy="17">:-    -------:MMMd--------------:</tspan>
    <tspan x="18" dy="17">:-   --------/MMMd-------------;</tspan>
    <tspan x="18" dy="17">:-    ------/hMMMy------------:</tspan>
    <tspan x="18" dy="17">:-- :dMNdhhdNMMNo------------;</tspan>
    <tspan x="18" dy="17">:---:sdNMMMMNds:------------:</tspan>
    <tspan x="18" dy="17">:------:://:-------------::</tspan>
    <tspan x="18" dy="17">:---------------------://</tspan>
  </text>
  <text x="175" y="316" text-anchor="middle" fill="#8bd5ff" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="10" letter-spacing="3">FEDORA // ONLINE</text>
</svg>
